<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neha Jatla — CS, AI &amp; Design @ Duke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="work.css">
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">neha.</a>
    <ul class="nav-links">
      <li><a href="index.html#work" id="nav-work">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main class="home-hero">
    <span class="hero-eyebrow">CS, AI &amp; Design @ Duke</span>
    <h1 class="hero-title">hi, i'm neha</h1>
    <p class="hero-subtitle">Building at the intersection of software, machine learning, and design.</p>
    <div class="scroll-cue" aria-hidden="true">
      <span>Scroll</span>
      <div class="scroll-cue-line"></div>
    </div>
  </main>

  <!-- ================================================================
       WORK — two-column staggered card grid, rendered by paintstore.js
       from the PROJECTS data array (see that file to add/edit projects).
       ================================================================ -->
  <section id="work">
    <div class="work-intro">
      <h2 class="work-heading">Selected Work</h2>
    </div>

    <div class="card-grid" id="card-grid"></div>
  </section>

  <!-- ================================================================
       CASE STUDY OVERLAY — one shared shell, populated per-project by
       paintstore.js when a swatch is opened.
       ================================================================ -->
  <div class="case-overlay" id="case-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="case-topbar">
      <button class="case-back" id="case-back">← Back to work</button>
      <button class="case-close" id="case-close" aria-label="Close case study">✕</button>
    </div>

    <div class="case-hero" id="case-hero">
      <p class="case-hero-label" id="case-hero-label"></p>
      <h2 class="case-hero-title" id="case-hero-title"></h2>
      <p class="case-hero-meta" id="case-hero-meta"></p>
    </div>

    <div class="case-body" id="case-body"></div>
  </div>

  <script src="paintstore.js"></script>
</body>
</html>
